<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">陌生 Agent 按协议协作</title>
  <desc id="desc">两个陌生 Agent 通过协议接口交换标准化模块。</desc>
  <style>
    :root { --paper: oklch(91% 0.035 82); --paper-2: oklch(84% 0.055 78); --ink: oklch(27% 0.035 55); --accent: oklch(49% 0.15 35); --gold: oklch(71% 0.13 78); --blue: oklch(52% 0.085 210); --rule: oklch(35% 0.03 55 / .25); }
    .paper { fill: var(--paper); } .paper-2 { fill: var(--paper-2); } .ink { fill: var(--ink); } .accent { fill: var(--accent); } .gold { fill: var(--gold); } .blue { fill: var(--blue); } .line { fill: none; stroke: var(--ink); stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; } .fine { fill: none; stroke: var(--rule); stroke-width: 4; } .dash { stroke-dasharray: 14 18; }
  </style>
  <rect class="paper" width="1200" height="800" rx="36"/>
  <path class="fine" d="M90 104H1110M90 696H1110"/>
  <circle class="paper-2" cx="226" cy="380" r="130"/>
  <circle class="ink" cx="226" cy="345" r="54"/>
  <path class="accent" d="M126 558c13-101 46-151 100-151s87 50 100 151z"/>
  <circle class="paper-2" cx="974" cy="380" r="130"/>
  <circle class="blue" cx="974" cy="345" r="54"/>
  <path class="ink" d="M874 558c13-101 46-151 100-151s87 50 100 151z"/>
  <path class="line dash" d="M370 382H830"/>
  <path class="line" d="m405 354-35 28 35 28M795 354l35 28-35 28"/>
  <rect class="gold" x="485" y="260" width="230" height="245" rx="22" transform="rotate(-4 600 382)"/>
  <rect class="paper" x="523" y="306" width="154" height="18" rx="9" transform="rotate(-4 600 382)"/>
  <rect class="ink" x="523" y="357" width="118" height="14" rx="7" opacity=".55" transform="rotate(-4 600 382)"/>
  <rect class="ink" x="523" y="400" width="146" height="14" rx="7" opacity=".38" transform="rotate(-4 600 382)"/>
  <rect class="accent" x="552" y="448" width="96" height="24" rx="12" transform="rotate(-4 600 382)"/>
